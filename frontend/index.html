<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earth Risk Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-10;
background:
radial-gradient(circle at 20% 20%, rgba(255,60,0,.15), transparent 30%),
radial-gradient(circle at 80% 40%, rgba(0,200,255,.12), transparent 35%),
radial-gradient(circle at 50% 90%, rgba(255,0,100,.1), transparent 30%),
#050816;
}

.noise{
position:fixed;
width:100%;
height:100%;
z-index:-9;
opacity:.04;
background:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:8%;
}

.hero h1{
font-size:90px;
font-weight:900;
line-height:0.95;
max-width:900px;
}

.hero p{
margin-top:25px;
font-size:22px;
color:#8ea4d2;
max-width:700px;
}

.glow{
color:#00d9ff;
text-shadow:0 0 40px rgba(0,217,255,.5);
}

/* FLOATING ORBS */

.orb{
position:absolute;
border-radius:50%;
filter:blur(100px);
animation:float 10s infinite ease-in-out;
}

.orb1{
width:300px;
height:300px;
background:#ff4400;
top:100px;
right:100px;
}

.orb2{
width:250px;
height:250px;
background:#00c8ff;
bottom:100px;
left:50px;
}

@keyframes float{
50%{
transform:translateY(-40px);
}
}

/* SECTION */

.section{
padding:80px;
}

.title{
font-size:42px;
margin-bottom:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
}

/* CARD */

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:24px;
padding:25px;
transition:.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px);
border-color:#00d9ff;
}

.card::before{
content:"";
position:absolute;
width:100%;
height:2px;
top:0;
left:0;
background:linear-gradient(90deg,#ff3c00,#00d9ff);
}

.place{
font-size:20px;
font-weight:700;
margin-bottom:15px;
}

.mag{
font-size:40px;
font-weight:900;
color:#ff6b57;
}

/* LIVE DOT */

.live{
position:fixed;
top:30px;
right:40px;
display:flex;
align-items:center;
gap:10px;
font-size:14px;
}

.dot{
width:10px;
height:10px;
background:#00ff66;
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.7);
opacity:.3;
}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="live">
<div class="dot"></div>
LIVE DATA
</div>

<section class="hero">

<h1>
EARTH <span class="glow">RISK</span><br>
INTELLIGENCE
</h1>

<p>
Real-time monitoring of earthquakes and global environmental threats.
</p>

</section>

<section class="section">

<h2 class="title">
🌍 Global Earthquakes
</h2>

<div id="earthquakes" class="grid"></div>

</section>

<script>

async function loadEarthquakes(){

const res = await fetch(
"http://127.0.0.1:8000/earthquakes"
);

const data = await res.json();

const container =
document.getElementById("earthquakes");

container.innerHTML = "";

data.earthquakes.forEach(q=>{

container.innerHTML += `
<div class="card">

<div class="place">
${q.place}
</div>

<div class="mag">
M ${q.mag}
</div>

</div>
`;

});

}

loadEarthquakes();

setInterval(
loadEarthquakes,
10000
);

</script>

</body>
</html>
